<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments | Nishankar Sathiyamohan</title>
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 0.75rem;">
                <img src="icon.jpg" alt="Logo" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                <span>NS.</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">← Back to Portfolio</a></li>
            <div class="nav-controls" style="gap: 0.5rem;">
                <button id="theme-toggle" class="btn btn-outline" style="padding: 0.5rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; border-radius: 50%; transform: translate(15px, -10px);">🌙</button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 100px;">
        <section id="moments" class="section">
            <div class="container">
                <h2 style="text-align: center; margin-bottom: 1rem;">Moments</h2>
                <p class="text-muted" style="text-align: center; max-width: 600px; margin: 0 auto 3rem;">Glimpses into academic events, community engagements, and professional milestones.</p>
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="My/IEEE.jpeg" alt="IEEE Event">
                        <div class="gallery-overlay">IEEE Community Event</div>
                    </div>
                    <div class="gallery-item">
                        <img src="My/IEEE3.jpeg" alt="IEEE Workshop">
                        <div class="gallery-overlay">Interactive Tech Workshop</div>
                    </div>
                    <div class="gallery-item">
                        <img src="My/WhatsApp Image 2026-01-31 at 4.18.53 PM.jpeg" alt="Event Moment">
                        <div class="gallery-overlay">Professional Interaction</div>
                    </div>
                    <div class="gallery-item">
                        <img src="My/profile.jpeg" alt="Profile Story">
                        <div class="gallery-overlay">Academic Journey</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer style="padding: 4rem 0; background: var(--bg-secondary); border-top: 1px solid var(--border);">
        <div class="container" style="text-align: center;">
            <p class="text-muted" style="font-size: 0.8rem;">&copy; 2026 Nishankar Sathiyamohan. Built for Academic Excellence.</p>
        </div>
    </footer>

    <script>
        // --- Toggle Light/Dark ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        function updateIcon(theme) {
            themeToggle.innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        body.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        // --- Scroll Animations ---
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);
        document.querySelectorAll('.section').forEach(section => observer.observe(section));
    </script>
</body>
</html>
