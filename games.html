<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games | Scientific Playground</title>
    <link rel="icon" href="icon.jpg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-theme="dark">
    <!-- Subtle Background -->
    <canvas id="bg-canvas" style="position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; opacity: 0.15;"></canvas>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 0.75rem;">
                <img src="icon.jpg" alt="Logo" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                <span>NS.</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">← Back to Portfolio</a></li>
            </ul>
            <div class="nav-controls" style="gap: 0.5rem;">
                <button id="theme-toggle" class="btn btn-outline" style="padding: 0.5rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; border-radius: 50%; transform: translate(15px, -10px);">🌙</button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 80px;">
        <!-- Scientific Playground Section -->
        <section id="science-lab" class="section">
            <div class="container">
                <div style="text-align: center; margin-bottom: 4rem;">
                    <h2 style="font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg, #fff 0%, #2dd4bf 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Scientific Playground</h2>
                    <p class="text-muted" style="max-width: 700px; margin: 0 auto; font-size: 1.1rem;">Interactive physics, math, and AI experiments designed to visualize complex phenomena in real-time.</p>
                </div>

                <!-- Filter Controls -->
                <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap;">
                    <button class="lab-filter-btn active" onclick="filterLab('all', this)">All Experiments</button>
                    <button class="lab-filter-btn" onclick="filterLab('physics', this)">Physics Lab</button>
                    <button class="lab-filter-btn" onclick="filterLab('math', this)">Discrete Math</button>
                    <button class="lab-filter-btn" onclick="filterLab('ai', this)">AI & Algos</button>
                </div>

                <!-- Simulation Grid -->
                <div class="grid-3" id="simulation-grid">
                    <!-- Cards will be injected by JS for better management -->
                </div>
            </div>

            <!-- Fullscreen Modal -->
            <div id="simulation-modal" class="lab-modal hidden">
                <div class="lab-modal-content">
                    <div class="lab-modal-header">
                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div id="modal-icon" style="font-size: 1.5rem;"></div>
                            <div>
                                <h3 id="modal-title" style="margin: 0; font-size: 1.25rem; font-weight: 700;"></h3>
                                <p id="modal-tagline" class="text-muted" style="margin: 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;"></p>
                            </div>
                        </div>
                        <button onclick="closeSimulation()" class="lab-close-btn">&times;</button>
                    </div>
                    
                    <div class="lab-modal-body">
                        <!-- Left Panel: Simulation Canvas -->
                        <div class="lab-canvas-container">
                            <canvas id="lab-canvas"></canvas>
                            <div id="lab-overlay" class="hidden"></div>
                        </div>
                        
                        <!-- Right Panel: Controls & Info -->
                        <div class="lab-controls-panel">
                            <div class="lab-panel-section">
                                <h4 class="lab-panel-title">Simulation Controls</h4>
                                <div id="lab-controls" class="lab-controls-grid">
                                    <!-- Dynamic controls here -->
                                </div>
                            </div>
                            
                            <div class="lab-panel-section">
                                <h4 class="lab-panel-title">How it works</h4>
                                <div id="lab-explanation" class="text-muted" style="font-size: 0.85rem; line-height: 1.5;">
                                    <!-- Dynamic explanation here -->
                                </div>
                            </div>

                            <div class="lab-panel-section mt-auto">
                                <div id="lab-stats" class="lab-stats-grid">
                                    <!-- Dynamic stats here -->
                                </div>
                                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                                    <button id="lab-reset-btn" class="btn btn-outline w-full" style="padding: 0.5rem; font-size: 0.8rem;">Reset</button>
                                    <button id="lab-action-btn" class="btn btn-primary w-full" style="padding: 0.5rem; font-size: 0.8rem;">Start</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer style="padding: 4rem 0; background: var(--bg-secondary); border-top: 1px solid var(--border);">
        <div class="container" style="text-align: center;">
            <p class="text-muted" style="font-size: 0.8rem;">&copy; 2026 Nishankar Sathiyamohan. Built for Academic Excellence.</p>
        </div>
    </footer>

    <style>
        .lab-filter-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 99px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .lab-filter-btn:hover { background: rgba(45, 212, 191, 0.05); color: #fff; }
        .lab-filter-btn.active { background: #2dd4bf; color: #030712; border-color: #2dd4bf; }

        .lab-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .lab-card:hover {
            transform: translateY(-10px);
            border-color: #2dd4bf55;
            background: rgba(45, 212, 191, 0.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .lab-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(45, 212, 191, 0.1), transparent 70%);
            opacity: 0; transition: opacity 0.4s ease;
        }
        .lab-card:hover::before { opacity: 1; }
        
        /* Force visibility for standalone page */
        .section { opacity: 1 !important; transform: none !important; }

        .hidden { display: none !important; }

        .lab-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(3, 7, 18, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .lab-modal-content {
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            background: #080b1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .lab-modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .lab-close-btn {
            font-size: 2rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
            background: none;
            border: none;
            cursor: pointer;
        }
        .lab-close-btn:hover { color: #f43f5e; }

        .lab-modal-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .lab-canvas-container {
            flex: 1;
            background: #030712;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lab-controls-panel {
            width: 350px;
            border-left: 1px solid rgba(255,255,255,0.05);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            background: rgba(255,255,255,0.01);
            overflow-y: auto;
        }
        .lab-panel-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #2dd4bf;
            margin-bottom: 1rem;
        }
        .lab-controls-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .lab-control-item { display: flex; flex-direction: column; gap: 0.5rem; }
        .lab-control-label { font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        
        .lab-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        .lab-stat-card {
            background: rgba(255,255,255,0.03);
            padding: 0.75rem;
            border-radius: 12px;
            text-align: center;
        }
        .lab-stat-val { font-family: 'Fira Code', monospace; color: #fff; font-weight: 700; font-size: 1.1rem; }
        .lab-stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }

        @media (max-width: 900px) {
            .lab-modal-body { flex-direction: column; }
            .lab-controls-panel { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.05); height: 300px; }
            .lab-canvas-container { min-height: 400px; }
        }
    </style>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- Toggle Light/Dark ---
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        function updateIcon(theme) {
            themeToggle.innerText = theme === 'dark' ? '☀️' : '🌙';
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        // Initialize Theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        body.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        // --- BG Animation ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 800;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 10;
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.005, color: 0x38bdf8 });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        camera.position.z = 3;
        function animateBG() { requestAnimationFrame(animateBG); particlesMesh.rotation.y += 0.0003; renderer.render(scene, camera); }
        animateBG();

        // --- Lab Data ---
        const sims = [
            { id: 'pendulum', title: 'Double Pendulum Chaos', icon: '⚛️', tags: ['Physics', 'Chaos'], category: 'physics', desc: 'Visualizing deterministic chaos through a high-precision double pendulum simulation.', explanation: 'A double pendulum is a pendulum with another pendulum attached to its end. It exhibits rich dynamic behavior with a strong sensitivity to initial conditions.', controls: [{ id: 'gravity', label: 'Gravity', min: 0.1, max: 2, step: 0.1, val: 1 }, { id: 'length', label: 'Arm Length', min: 50, max: 150, step: 10, val: 100 }] },
            { id: 'gravity', title: 'N-Body Star System', icon: '🌌', tags: ['Physics', 'Astronomy'], category: 'physics', desc: 'Simulating orbital mechanics and gravitational interaction between celestial bodies.', explanation: 'Using Newton’s Law of Universal Gravitation to simulate the complex dance of multiple stars.', controls: [{ id: 'bodies', label: 'Object Count', min: 2, max: 12, step: 1, val: 6 }, { id: 'g_const', label: 'G Constant', min: 0.1, max: 5, step: 0.1, val: 1 }] },
            { id: 'graph', title: 'Graph Theory Lab', icon: '🕸️', tags: ['Math', 'Graphs'], category: 'math', desc: 'Interactive graph constructor with Dijkstra’s shortest path algorithm.', explanation: 'Build complex topologies by adding nodes and weighted edges. Visualize how Dijkstra’s algorithm finds the most efficient routes.', controls: [{ id: 'node_count', label: 'Init Nodes', min: 4, max: 10, step: 1, val: 6 }] },
            { id: 'pathfinding', title: 'A* Pathfinding', icon: '📍', tags: ['Algos', 'AI'], category: 'ai', desc: 'Visualizing pathfinding efficiency across dynamic grid-based environments.', explanation: 'A* is a heuristic-based search algorithm used in game dev and robotics.', controls: [{ id: 'grid_size', label: 'Density', min: 10, max: 40, step: 2, val: 24 }] },
            { id: 'neural', title: 'Neural Playground', icon: '🧠', tags: ['AI', 'Math'], category: 'ai', desc: 'Train a simple perceptron-based neural network in real-time.', explanation: 'Adjust layers and learning rates to see how artificial neurons adapt to classify non-linear data points.', controls: [{ id: 'learning_rate', label: 'L-Rate', min: 0.01, max: 0.5, step: 0.01, val: 0.1 }, { id: 'hidden_size', label: 'Neurons', min: 2, max: 10, step: 1, val: 4 }] },
            { id: 'projectile', title: 'Projectile Motion', icon: '🚀', tags: ['Physics', 'Ballistics'], category: 'physics', desc: 'Precision kinematic simulator for sub-orbital trajectories.', explanation: 'Calculate range, peak height, and impact velocity while adjusting launch parameters.', controls: [{ id: 'angle', label: 'Launch Angle', min: 0, max: 90, step: 1, val: 45 }, { id: 'power', label: 'Init Velocity', min: 10, max: 100, step: 5, val: 60 }] }
        ];

        let activeSim, labCanvas = document.getElementById('lab-canvas'), labCtx = labCanvas.getContext('2d'), simFrame;

        function initLabGrid() {
            document.getElementById('simulation-grid').innerHTML = sims.map(s => `
                <div class="lab-card" data-category="${s.category}" onclick="launchSimulation('${s.id}')">
                    <div style="font-size: 2.5rem; margin-bottom: 1rem;">${s.icon}</div>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.75rem;">
                        ${s.tags.map(t => `<span style="font-size: 0.6rem; font-weight: 700; color: #2dd4bf; background: rgba(45, 212, 191, 0.05); padding: 0.2rem 0.6rem; border-radius: 4px;">${t}</span>`).join('')}
                    </div>
                    <h3 style="margin-bottom: 0.5rem; font-size: 1.1rem;">${s.title}</h3>
                    <p class="text-muted" style="font-size: 0.8rem;">${s.desc}</p>
                </div>
            `).join('');
        }

        function filterLab(cat, btn) {
            document.querySelectorAll('.lab-filter-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.querySelectorAll('.lab-card').forEach(c => c.style.display = (cat === 'all' || c.dataset.category === cat) ? 'block' : 'none');
        }

        function launchSimulation(id) {
            const sim = sims.find(s => s.id === id);
            document.getElementById('modal-title').innerText = sim.title;
            document.getElementById('modal-icon').innerText = sim.icon;
            document.getElementById('modal-tagline').innerText = sim.tags.join(' • ');
            document.getElementById('lab-explanation').innerText = sim.explanation;
            document.getElementById('simulation-modal').classList.remove('hidden');
            document.getElementById('lab-controls').innerHTML = sim.controls.map(c => `
                <div class="lab-control-item">
                    <div class="lab-control-label"><span>${c.label}</span><span id="val-${c.id}">${c.val}</span></div>
                    <input type="range" min="${c.min}" max="${c.max}" step="${c.step}" value="${c.val}" oninput="updateControl('${c.id}', this.value)">
                </div>
            `).join('');
            resizeLab();
            startSimInstance(id);
        }

        function updateControl(id, val) {
            document.getElementById(`val-${id}`).innerText = val;
            if(activeSim && activeSim.updateParam) activeSim.updateParam(id, parseFloat(val));
        }

        function closeSimulation() {
            document.getElementById('simulation-modal').classList.add('hidden');
            if (simFrame) cancelAnimationFrame(simFrame);
            if (activeSim && activeSim.destroy) activeSim.destroy();
            activeSim = null;
        }

        function resizeLab() {
            labCanvas.width = labCanvas.parentElement.clientWidth;
            labCanvas.height = labCanvas.parentElement.clientHeight;
        }

        // --- Classes ---
        class DoublePendulum {
            constructor(ctx, canvas) { this.ctx = ctx; this.canvas = canvas; this.g = 1; this.m1 = 10; this.m2 = 10; this.r1 = 100; this.r2 = 100; this.a1 = 1.5; this.a2 = 1.5; this.a1_v = 0; this.a2_v = 0; this.history = []; }
            updateParam(id, val) { if(id === 'gravity') this.g = val; if(id === 'length') { this.r1 = val; this.r2 = val; } }
            update() {
                let d2a1 = (-this.g*(2*this.m1+this.m2)*Math.sin(this.a1)-this.m2*this.g*Math.sin(this.a1-2*this.a2)-2*Math.sin(this.a1-this.a2)*this.m2*(this.a2_v**2*this.r2+this.a1_v**2*this.r1*Math.cos(this.a1-this.a2)))/(this.r1*(2*this.m1+this.m2-this.m2*Math.cos(2*this.a1-2*this.a2)));
                let d2a2 = (2*Math.sin(this.a1-this.a2)*(this.a1_v**2*this.r1*(this.m1+this.m2)+this.g*(this.m1+this.m2)*Math.cos(this.a1)+this.a2_v**2*this.r2*this.m2*Math.cos(this.a1-this.a2)))/(this.r2*(2*this.m1+this.m2-this.m2*Math.cos(2*this.a1-2*this.a2)));
                this.a1_v += d2a1; this.a2_v += d2a2; this.a1 += this.a1_v; this.a2 += this.a2_v;
                this.a1_v *= 0.999; this.a2_v *= 0.999;
                const cx = this.canvas.width/2, cy = this.canvas.height/3, x1 = cx + this.r1*Math.sin(this.a1), y1 = cy+this.r1*Math.cos(this.a1), x2 = x1+this.r2*Math.sin(this.a2), y2 = y1+this.r2*Math.cos(this.a2);
                this.history.push({x: x2, y: y2}); if(this.history.length > 200) this.history.shift();
                this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
                this.ctx.beginPath(); this.ctx.strokeStyle = '#2dd4bf33'; this.history.forEach((p,i) => i === 0 ? this.ctx.moveTo(p.x,p.y) : this.ctx.lineTo(p.x,p.y)); this.ctx.stroke();
                this.ctx.beginPath(); this.ctx.strokeStyle = '#94a3b8'; this.ctx.lineWidth = 4; this.ctx.moveTo(cx,cy); this.ctx.lineTo(x1,y1); this.ctx.lineTo(x2,y2); this.ctx.stroke();
                this.ctx.fillStyle = '#2dd4bf'; this.ctx.beginPath(); this.ctx.arc(x1,y1,8,0,7); this.ctx.fill();
                this.ctx.fillStyle = '#f43f5e'; this.ctx.beginPath(); this.ctx.arc(x2,y2,8,0,7); this.ctx.fill();
            }
        }

        class GravitySystem {
            constructor(ctx, canvas) { this.ctx = ctx; this.canvas = canvas; this.bodies = []; this.g = 1; this.init(6); }
            init(count) { this.bodies = Array.from({length:count}, () => ({x:Math.random()*this.canvas.width, y:Math.random()*this.canvas.height, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, m:Math.random()*20+5, color:`hsl(${Math.random()*360},70%,60%)`, history:[]})); }
            updateParam(id, val) { if(id === 'bodies') this.init(val); if(id === 'g_const') this.g = val; }
            update() {
                for(let i=0; i<this.bodies.length; i++) {
                    for(let j=i+1; j<this.bodies.length; j++) {
                        let b1 = this.bodies[i], b2 = this.bodies[j], dx = b2.x-b1.x, dy = b2.y-b1.y, d2 = dx*dx+dy*dy+100, d = Math.sqrt(d2), f = (this.g*b1.m*b2.m)/d2;
                        b1.vx += f*dx/d/b1.m; b1.vy += f*dy/d/b1.m; b2.vx -= f*dx/d/b2.m; b2.vy -= f*dy/d/b2.m;
                    }
                }
                this.ctx.fillStyle = 'rgba(3,7,18,0.2)'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                this.bodies.forEach(b => {
                    b.x += b.vx; b.y += b.vy;
                    if(b.x < 0) b.x = this.canvas.width; if(b.x > this.canvas.width) b.x = 0;
                    if(b.y < 0) b.y = this.canvas.height; if(b.y > this.canvas.height) b.y = 0;
                    b.history.push({x:b.x, y:b.y}); if(b.history.length > 30) b.history.shift();
                    this.ctx.beginPath(); this.ctx.strokeStyle = b.color+'66'; b.history.forEach((p,i) => i === 0 ? this.ctx.moveTo(p.x,p.y) : this.ctx.lineTo(p.x,p.y)); this.ctx.stroke();
                    this.ctx.fillStyle = b.color; this.ctx.beginPath(); this.ctx.arc(b.x,b.y,Math.sqrt(b.m),0,7); this.ctx.fill();
                });
            }
        }

        class GraphLab {
            constructor(ctx, canvas) { this.ctx = ctx; this.canvas = canvas; this.nodes = []; this.edges = []; this.init(6); this.canvas.onmousedown = (e) => this.handleMouseDown(e); }
            init(count) { this.nodes = Array.from({length:count}, (_,i) => ({id:i, x:100+Math.random()*(this.canvas.width-200), y:100+Math.random()*(this.canvas.height-200), dist:Infinity})); this.edges = []; for(let i=0;i<count;i++) for(let j=i+1;j<count;j++) if(Math.random()>0.6) this.edges.push({a:i,b:j,w:Math.floor(Math.random()*10)+1}); }
            updateParam(id, val) { if(id === 'node_count') this.init(val); }
            handleMouseDown(e) {
                const rect = this.canvas.getBoundingClientRect(), x = e.clientX-rect.left, y = e.clientY-rect.top, hit = this.nodes.find(n => Math.hypot(n.x-x, n.y-y) < 20);
                if(hit) { if(this.selected && this.selected !== hit) { this.edges.push({a:this.selected.id, b:hit.id, w:5}); this.selected = null; } else this.selected = hit; }
                else { this.nodes.push({id:this.nodes.length, x, y, dist:Infinity}); this.selected = null; }
            }
            runDijkstra() {
                this.nodes.forEach(n => { n.dist = Infinity; n.p = null; n.v = false; }); this.nodes[0].dist = 0; let q = [...this.nodes];
                while(q.length > 0) { q.sort((a,b)=>a.dist-b.dist); let u = q.shift(); u.v = true; this.edges.forEach(e => { let v = e.a === u.id ? this.nodes.find(n=>n.id===e.b) : (e.b === u.id ? this.nodes.find(n=>n.id===e.a) : null); if(v && !v.v) { let alt = u.dist+e.w; if(alt < v.dist) { v.dist = alt; v.p = u.id; } } }); }
            }
            update() {
                this.ctx.fillStyle = '#030712'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                this.edges.forEach(e => { let n1 = this.nodes.find(n=>n.id===e.a), n2 = this.nodes.find(n=>n.id===e.b); this.ctx.beginPath(); this.ctx.strokeStyle = (n1.p === n2.id || n2.p === n1.id) ? '#2dd4bf' : '#ffffff22'; this.ctx.moveTo(n1.x,n1.y); this.ctx.lineTo(n2.x,n2.y); this.ctx.stroke(); });
                this.nodes.forEach(n => { this.ctx.beginPath(); this.ctx.fillStyle = n.dist < Infinity ? '#2dd4bf44' : '#1e293b'; this.ctx.arc(n.x,n.y,12,0,7); this.ctx.fill(); this.ctx.fillStyle='#fff'; this.ctx.textAlign='center'; this.ctx.fillText(n.id, n.x, n.y+4); });
            }
            destroy() { this.canvas.onmousedown = null; }
        }

        class Pathfinder {
            constructor(ctx, canvas) { this.ctx = ctx; this.canvas = canvas; this.init(25); this.canvas.onmousedown = (e) => { this.isDrawing = true; this.handleInput(e); }; this.canvas.onmousemove = (e) => { if(this.isDrawing) this.handleInput(e); }; this.canvas.onmouseup = () => this.isDrawing = false; }
            init(size) { this.gridSize = size; this.grid = Array(Math.ceil(this.canvas.height/size)).fill().map(() => Array(Math.ceil(this.canvas.width/size)).fill(0)); this.start={x:2,y:2}; this.end={x:10,y:10}; }
            updateParam(id, val) { if(id === 'grid_size') this.init(val); }
            handleInput(e) { const rect = this.canvas.getBoundingClientRect(), x = Math.floor((e.clientX-rect.left)/this.gridSize), y = Math.floor((e.clientY-rect.top)/this.gridSize); if(y >= 0 && y < this.grid.length && x >= 0 && x < this.grid[0].length) this.grid[y][x] = 1; }
            runAStar() { 
                let q = [this.start], cameFrom = new Map(), g = Array(this.grid.length).fill().map(() => Array(this.grid[0].length).fill(Infinity)); g[this.start.y][this.start.x] = 0; this.path = [];
                while(q.length > 0) {
                    let cur = q.shift(); if(cur.x === this.end.x && cur.y === this.end.y) { let c = cur; while(cameFrom.has(`${c.x},${c.y}`)) { this.path.push(c); c = cameFrom.get(`${c.x},${c.y}`); } return; }
                    [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}].forEach(n => { let nx = cur.x+n.x, ny = cur.y+n.y; if(ny>=0 && ny<this.grid.length && nx>=0 && nx<this.grid[0].length && this.grid[ny][nx]!==1) { let tg = g[cur.y][cur.x]+1; if(tg < g[ny][nx]) { g[ny][nx]=tg; cameFrom.set(`${nx},${ny}`, cur); q.push({x:nx, y:ny}); } } });
                }
            }
            update() {
                this.ctx.fillStyle = '#030712'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                for(let y=0; y<this.grid.length; y++) for(let x=0; x<this.grid[0].length; x++) if(this.grid[y][x]===1) { this.ctx.fillStyle='#1e293b'; this.ctx.fillRect(x*this.gridSize, y*this.gridSize, this.gridSize, this.gridSize); }
                if(this.path) { this.ctx.fillStyle='#2dd4bf66'; this.path.forEach(p => this.ctx.fillRect(p.x*this.gridSize, p.y*this.gridSize, this.gridSize, this.gridSize)); }
                this.ctx.fillStyle='#2dd4bf'; this.ctx.fillRect(this.start.x*this.gridSize, this.start.y*this.gridSize, this.gridSize, this.gridSize);
                this.ctx.fillStyle='#f43f5e'; this.ctx.fillRect(this.end.x*this.gridSize, this.end.y*this.gridSize, this.gridSize, this.gridSize);
            }
            destroy() { this.canvas.onmousedown = this.canvas.onmousemove = this.canvas.onmouseup = null; }
        }

        class NeuralNet {
            constructor(ctx, canvas) { this.ctx = ctx; this.canvas = canvas; this.init(); }
            init() { this.weights1 = Array(2).fill().map(() => Array(4).fill().map(() => Math.random()*2-1)); this.bias1 = Array(4).fill(0); this.weights2 = Array(4).fill().map(() => Math.random()*2-1); this.bias2 = 0; this.points = Array.from({length:40}, () => { let x = Math.random()*2-1, y = Math.random()*2-1; return {x,y,label:x*x+y*y < 0.4 ? 1 : 0}; }); this.lh=[]; }
            updateParam(id, val) { if(id === 'learning_rate') this.lr = val; }
            sigmoid(x) { return 1/(1+Math.exp(-x)); }
            update() {
                this.points.forEach(p => { 
                    let h = this.bias1.map((b,i) => this.sigmoid(b+this.weights1[0][i]*p.x+this.weights1[1][i]*p.y));
                    let pred = this.sigmoid(this.bias2 + h.reduce((acc,v,i) => acc+v*this.weights2[i], 0));
                    let dO = (p.label-pred)*pred*(1-pred);
                    for(let i=0; i<4; i++) { let dH = dO*this.weights2[i]*h[i]*(1-h[i]); this.weights2[i]+=0.1*dO*h[i]; this.weights1[0][i]+=0.1*dH*p.x; this.weights1[1][i]+=0.1*dH*p.y; this.bias1[i]+=0.1*dH; }
                    this.bias2 += 0.1*dO;
                });
                this.ctx.fillStyle='#030712'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                for(let x=0;x<this.canvas.width;x+=15) for(let y=0;y<this.canvas.height;y+=15) {
                    let nx=x/this.canvas.width*2-1, ny=y/this.canvas.height*2-1, h=this.bias1.map((b,i)=>this.sigmoid(b+this.weights1[0][i]*nx+this.weights1[1][i]*ny)), pred=this.sigmoid(this.bias2+h.reduce((acc,v,i)=>acc+v*this.weights2[i],0));
                    this.ctx.fillStyle=`rgba(45,212,191,${pred*0.15})`; this.ctx.fillRect(x,y,15,15);
                }
                this.points.forEach(p => { this.ctx.fillStyle = p.label===1?'#2dd4bf':'#f43f5e'; this.ctx.beginPath(); this.ctx.arc((p.x+1)/2*this.canvas.width, (p.y+1)/2*this.canvas.height, 4, 0, 7); this.ctx.fill(); });
            }
        }

        class ProjectileLab {
            constructor(ctx, canvas) { this.ctx = ctx; this.canvas = canvas; this.a=45; this.p=60; this.g=0.5; this.path=[]; this.active=false; }
            updateParam(id, val) { if(id==='angle') this.a=val; if(id==='power') this.p=val; }
            launch() { this.active=true; this.path=[]; let r=(90-this.a)*Math.PI/180; this.proj={x:50, y:this.canvas.height-50, vx:Math.cos(r)*this.p*0.2, vy:-Math.sin(r)*this.p*0.2}; }
            update() {
                if(this.active) { this.proj.vy += this.g; this.proj.x += this.proj.vx; this.proj.y += this.proj.vy; this.path.push({x:this.proj.x, y:this.proj.y}); if(this.proj.y > this.canvas.height-50) this.active=false; }
                this.ctx.fillStyle='#030712'; this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
                this.ctx.fillStyle='#1e293b'; this.ctx.fillRect(0,this.canvas.height-50,this.canvas.width,50);
                this.ctx.beginPath(); this.ctx.strokeStyle='#2dd4bf44'; this.path.forEach((p,i)=>i===0?this.ctx.moveTo(p.x,p.y):this.ctx.lineTo(p.x,p.y)); this.ctx.stroke();
                if(this.proj) { this.ctx.fillStyle='#2dd4bf'; this.ctx.beginPath(); this.ctx.arc(this.proj.x, this.proj.y, 6, 0, 7); this.ctx.fill(); }
            }
        }

        function startSimInstance(id) {
            if(simFrame) cancelAnimationFrame(simFrame);
            if(id === 'pendulum') activeSim = new DoublePendulum(labCtx, labCanvas);
            else if(id === 'gravity') activeSim = new GravitySystem(labCtx, labCanvas);
            else if(id === 'graph') activeSim = new GraphLab(labCtx, labCanvas);
            else if(id === 'pathfinding') activeSim = new Pathfinder(labCtx, labCanvas);
            else if(id === 'neural') activeSim = new NeuralNet(labCtx, labCanvas);
            else if(id === 'projectile') activeSim = new ProjectileLab(labCtx, labCanvas);
            document.getElementById('lab-action-btn').onclick = () => { if(id === 'graph') activeSim.runDijkstra(); if(id === 'pathfinding') activeSim.runAStar(); if(id === 'projectile') activeSim.launch(); };
            document.getElementById('lab-reset-btn').onclick = () => launchSimulation(id);
            function loop() { if(activeSim) activeSim.update(); simFrame = requestAnimationFrame(loop); }
            loop();
        }

        initLabGrid();

        // --- Scroll Animations ---
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);
        document.querySelectorAll('.section').forEach(section => observer.observe(section));
    </script>
</body>
</html>
